<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" />
    <title>Rock Paper Scissors game.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="count">
      <div>
        <label for="Robot-Pick">Robot Pick:</label>
        <input id="robot-pick" value="" disabled />
        <label for="Player Pick">Player Pick:</label>
        <input type="" id="player-pick" value="" disabled />
      </div>
      <div class="restart">
        <button onclick="window.location.reload()">Restart</button>
      </div>
      <div class="player-count">
        <label for="Robot Count">Robot Count:</label>
        <input type="number" id="robot-count" value="0" disabled />
        <label for="Player Count">Player Count:</label>
        <input id="human-count" value="0" disabled />
      </div>
    </div>
    <div class="container">
      <p>Press S to start</p>
      <div class="buttons">
        <button class="container">Rock</button>
        <button class="container">Paper</button>
        <button class="container">Scissors</button>
      </div>
    </div>
    <script src="./game.js"></script>
  </body>
</html>
